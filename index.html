<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ratings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authSection" class="auth-section">
            <div class="auth-container">
                <h1>Movie Ratings</h1>
                
                <!-- Login Form -->
                <div id="loginForm" class="form-container">
                    <h2>Login</h2>
                    <form id="loginFormElement">
                        <input type="text" id="loginUsername" placeholder="Username" required>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <button type="submit">Login</button>
                        <p>Don't have an account? <a href="#" onclick="toggleForms()">Register</a></p>
                    </form>
                    <div id="loginMessage" class="message"></div>
                </div>

                <!-- Registration Form -->
                <div id="registerForm" class="form-container" style="display: none;">
                    <h2>Register</h2>
                    <form id="registerFormElement">
                        <input type="text" id="registerUsername" placeholder="Username" required>
                        <input type="password" id="registerPassword" placeholder="Password" required>
                        <input type="password" id="registerPasswordConfirm" placeholder="Confirm Password" required>
                        <button type="submit">Register</button>
                        <p>Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
                    </form>
                    <div id="registerMessage" class="message"></div>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="appSection" class="app-section" style="display: none;">
            <header>
                <h1>Movie Ratings</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <button id="logoutBtn">Logout</button>
                </div>
            </header>

            <main>
                <!-- Movie List Section -->
                <section class="movies-section">
                    <h2>Movies</h2>
                    <input type="text" id="movieSearch" placeholder="Search by title..." oninput="searchMovies(this.value)">
                    <div id="moviesList" class="movies-grid">
                    <div id="moviesList" class="movies-grid">
                        <!-- Movies will be loaded here -->
                    </div>
                </section>

                <!-- Movie Detail Modal -->
                <div id="movieModal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <span class="close" onclick="closeMovieModal()">&times;</span>
                        <h2 id="modalTitle"></h2>
                        <div id="modalContent">
                            <!-- Movie details and rating form will go here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
